<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pregnancy</title>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { 
            margin: 0; 
            background: #fdf2f2; /* Απαλό ροζ φόντο που ταιριάζει με το logo σου */
            color: #4a4a4a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        .container { 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            padding: 30px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        
        .logo-img { 
            width: 160px; 
            border-radius: 35px; 
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.2);
        }

        h2 { 
            font-weight: 400; 
            color: #ff9a9e; 
            margin-bottom: 35px;
            font-size: 1.5em;
        }

        .main-btn { 
            display: block; 
            padding: 22px; 
            text-decoration: none; 
            color: white !important; 
            font-weight: bold; 
            border-radius: 25px; 
            font-size: 1.1em; 
            text-align: center;
            background: linear-gradient(45deg, #fbc2eb 0%, #a6c1ee 100%);
            box-shadow: 0 6px 20px rgba(251, 194, 235, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        
        .main-btn:active { 
            transform: scale(0.95); 
            box-shadow: 0 2px 10px rgba(251, 194, 235, 0.2);
        }

        .doctor-btn {
            margin-top: 15px;
            background: #ffffff;
            color: #d63384 !important;
            border: 2px solid #fbc2eb;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.9em;
            text-decoration: none;
            display: inline-block;
        }

        p { font-size: 0.9em; color: #a0a0a0; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" class="logo-img" alt="MyPregnancyGuide Logo">
        
        <a href="https://afroditi-app-cgr623mnfnnshsrwxcbczj.streamlit.app" class="main-btn" onclick="clearSession()">
            🌸 ΕΙΣΟΔΟΣ ΣΤΗΝ ΕΦΑΡΜΟΓΗ
        </a>

        <a href="#" class="doctor-btn" onclick="alert('Η αναφορά θα είναι διαθέσιμη μόλις συμπληρωθούν τα στοιχεία σας στην εφαρμογή.')">
            📋 Αναφορά για τον Γιατρό
        </a>
        
        <p>MyPregnancyGuide v1.1</p>
    </div>

    <script>
        // Λειτουργία που διασφαλίζει ότι η εφαρμογή ξεκινάει "καθαρή"
        function clearSession() {
            // Καθαρίζει τα τοπικά δεδομένα του browser (localStorage) 
            // αν η εφαρμογή Streamlit αποθηκεύει εκεί πληροφορίες
            localStorage.clear();
            sessionStorage.clear();
        }
    </script>

</body>
</html>
